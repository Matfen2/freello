version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: freello-postgres
    environment:
      POSTGRES_USER: freello
      POSTGRES_PASSWORD: freello
      POSTGRES_DB: freello
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: